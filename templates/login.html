<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión · RestoPro</title>
    <script src="/static/libs/tailwind.min.js"></script>
    <style>
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:ui-sans-serif,system-ui,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#78350f 100%); padding:16px; }
        .card { background:white; border-radius:20px; padding:36px 32px; width:100%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,0.4); }
        .input { width:100%; border:1px solid #e2e8f0; border-radius:10px; padding:11px 14px; font-size:0.9rem; outline:none; transition:all 0.2s; }
        .input:focus { border-color:#f59e0b; box-shadow:0 0 0 3px rgba(245,158,11,0.18); }
        .btn { width:100%; background:#f59e0b; color:white; font-weight:700; padding:12px; border-radius:10px; border:none; cursor:pointer; font-size:1rem; transition:all 0.2s; }
        .btn:hover { background:#d97706; }
        .label { display:block; font-size:0.84rem; font-weight:600; color:#374151; margin-bottom:6px; }
        .flash-error { background:#fef2f2; color:#b91c1c; border:1px solid #fecaca; border-radius:10px; padding:10px 14px; font-size:0.875rem; margin-bottom:16px; }
        .flash-warn  { background:#fefce8; color:#854d0e; border:1px solid #fde68a; border-radius:10px; padding:10px 14px; font-size:0.875rem; margin-bottom:16px; }
    </style>
</head>
<body>
<div class="card">
    <div style="text-align:center;margin-bottom:28px;">
        <div style="width:56px;height:56px;background:#f59e0b;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 12px;">🍽️</div>
        <h1 style="font-size:1.4rem;font-weight:800;color:#1e293b;">RestoPro</h1>
        <p style="color:#94a3b8;font-size:0.85rem;margin-top:4px;">Sistema de gestión de restaurante</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="{{ 'flash-error' if category == 'error' else 'flash-warn' }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}
    <form method="POST" action="{{ url_for('auth.login') }}">
        <div style="margin-bottom:16px;">
            <label class="label">Usuario</label>
            <input type="text" name="username" class="input" placeholder="Tu usuario" required autofocus>
        </div>
        <div style="margin-bottom:24px;">
            <label class="label">Contraseña</label>
            <input type="password" name="password" class="input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn">Iniciar Sesión →</button>
    </form>
    <p style="text-align:center;font-size:0.75rem;color:#94a3b8;margin-top:20px;">Restaurante Turístico Marangani</p>
</div>
</body>
</html>
